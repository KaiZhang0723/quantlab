# Default configuration for the quantlab CLI.
#
# Override on the command line, e.g.:
#     quantlab --config configs/default.yaml fetch --tickers AAPL --out prices.csv
#
# Any field omitted here must be supplied via CLI flags.

tickers:
  - AAPL
  - MSFT
  - GOOGL
  - AMZN
  - NVDA
  - JPM
  - XOM
  - JNJ
  - PG
  - WMT

start: "2015-01-01"
end:   "2024-12-31"

backtest:
  lookback: 252
  skip: 21
  workers: 4

forecast:
  task: classification
  n_splits: 5

var:
  confidence: 0.99
  horizon: 10
  paths: 50000
  workers: 4
